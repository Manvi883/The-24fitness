<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | 24Fitness</title>

    <link rel="stylesheet" href="css/login.css">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <img src="images/logo.png" alt="24Fitness Logo" class="logo">

        <h1>Create Account</h1>

        <p class="subtitle">
            Join 24Fitness and begin your fitness journey.
        </p>

        <form>

            <input
                type="text"
                placeholder="Full Name"
                required
            >

            <input
                type="email"
                placeholder="Email Address"
                required
            >

            <input
                type="tel"
                placeholder="Mobile Number"
                required
            >

            <input
                type="number"
                placeholder="Age"
                required
            >

            <select required>

                <option value="">Select Gender</option>

                <option>Male</option>

                <option>Female</option>

                <option>Other</option>

            </select>

            <input
                type="password"
                placeholder="Create Password"
                required
            >

            <input
                type="password"
                placeholder="Confirm Password"
                required
            >

            <button type="submit">
                Create Account
            </button>

        </form>

        <div class="links">

            <span>
                Already have an account?
            </span>

            <a href="client.html">
                Login
            </a>

        </div>

        <a href="index.html" class="back">
            ← Back to Home
        </a>

    </div>

</div>

</body>
</html>
